<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>添加用户组</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <script defer src="../assets/theme.js"></script>
  <style>
    .add-group-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .add-group-title {
      background: #4f7893;
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
    }

    .add-group-form {
      display: grid;
      grid-template-columns: 220px minmax(360px, 1fr);
      gap: 18px 28px;
      padding: 22px;
      background: #f7fafc;
      align-items: start;
    }

    .add-group-label {
      font-weight: 700;
      color: #26384d;
    }

    .add-group-form input[type="text"] {
      max-width: 260px;
      width: 100%;
    }

    .add-group-box {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 14px;
      max-width: 520px;
    }

    .add-group-box strong {
      display: block;
      margin-bottom: 8px;
    }

    .add-group-box label {
      display: block;
      margin: 7px 0;
    }

    .permission-row {
      margin: 8px 0;
    }

    .permission-child {
      margin-left: 24px;
    }

    .add-group-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <p><a href="../index.html">返回目录</a></p>
  <h1>添加用户组</h1>
  <p>论坛管理员后台 &gt; 权限与安全 &gt; 编辑用户组 &gt; 添加用户组</p>
  <nav>
    <a href="./01-用户组管理.html">编辑用户组</a>
    <a href="./02-新增用户组.html">新增用户组</a>
    <a href="./03-全局权限.html">全局权限</a>
    <a href="./04-板块权限管理.html">板块权限管理</a>
    <a href="./05-编辑权限文件.html">编辑权限文件</a>
    <a href="./10-发帖时间段.html">发帖时间段</a>
  </nav>

  <section class="add-group-card">
    <div class="add-group-title">添加用户组</div>
    <form class="add-group-form">
      <div class="add-group-label">群组名称:</div>
      <input type="text">

      <div class="add-group-label">
        权限:
        <div>您之后还可以编辑。</div>
      </div>
      <div class="add-group-box">
        <strong>选择权限档</strong>
        <label><input type="radio" name="permission-profile" checked> 继承自：<select><option selected>正式成员</option></select></label>
        <label><input type="radio" name="permission-profile"> 按照：<select><option selected>正式成员</option></select></label>
        <label><input type="radio" name="permission-profile"> 依照类型：<select><option selected>标准</option></select></label>
      </div>

      <div class="add-group-label">可见版块:</div>
      <div class="add-group-box">
        <strong>允许这个群组的成员进入的版块。</strong>
        <div class="permission-row"><strong>1. Forum Management</strong></div>
        <label class="permission-row"><input type="checkbox"> 1.1 Beginners &amp; Help &amp; Tutorial</label>
        <label class="permission-row permission-child"><input type="checkbox"> 中文教程帮助</label>
        <label class="permission-row"><input type="checkbox"> 1.2 Management &amp; Governance</label>
        <label class="permission-row"><input type="checkbox"> 1.3 Official Announcements</label>
        <label class="permission-row permission-child"><input type="checkbox"> 中文公告</label>

        <div class="permission-row"><strong>2. Bit Civilization</strong></div>
        <label class="permission-row"><input type="checkbox"> 2.1 General Discussion</label>
        <label class="permission-row permission-child"><input type="checkbox"> 2.1.1 中文综合讨论区</label>
        <label class="permission-row"><input type="checkbox"> 2.2 Bitcoin Discussion</label>
        <label class="permission-row permission-child"><input type="checkbox"> 2.2.1 中文比特币讨论专区</label>
        <label class="permission-row"><input type="checkbox"> 2.3 Atomicals Discussion</label>
        <label class="permission-row permission-child"><input type="checkbox"> 2.2.1 中文Atomicals 讨论专区</label>
        <label class="permission-row"><input type="checkbox"> 2.4 RCity Discussion</label>
        <label class="permission-row permission-child"><input type="checkbox"> 2.4.1 中文RCity讨论专区</label>

        <div class="permission-row"><strong>3. RCity Guilds</strong></div>
        <label class="permission-row"><input type="checkbox"> 3.1 Financial Guild</label>
        <label class="permission-row permission-child"><input type="checkbox"> 3.1.1 中文财务</label>
        <label class="permission-row"><input type="checkbox"> 3.2 Operation Guild</label>
      </div>

      <div class="add-group-actions">
        <button type="button">保存</button>
        <button type="button">取消</button>
      </div>
    </form>
  </section>
</body>
</html>
