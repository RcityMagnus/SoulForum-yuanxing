<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台注册新会员</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <script defer src="../assets/theme.js"></script>
  <style>
    .signup-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .signup-form {
      display: grid;
      grid-template-columns: 260px minmax(300px, 1fr);
      gap: 12px 28px;
      padding: 20px;
      background: #f7fafc;
      align-items: center;
    }

    .signup-label strong {
      display: block;
      margin-bottom: 4px;
      color: #26384d;
    }

    .signup-label span {
      color: var(--muted);
      font-size: 13px;
    }

    .signup-form input[type="text"],
    .signup-form input[type="email"],
    .signup-form input[type="password"] {
      width: 360px;
      max-width: 100%;
    }

    .signup-form select {
      width: 150px;
    }

    .signup-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      padding-top: 2px;
    }
  </style>
</head>
<body>
  <p><a href="../index.html">返回目录</a></p>
  <h1>后台注册新会员</h1>
  <p>论坛管理员后台 &gt; 注册与封禁 &gt; 后台注册新会员</p>
  <nav>
    <a href="./01-后台注册新会员.html">后台注册新会员</a>
    <a href="./02-注册协议设置.html">注册协议设置</a>
    <a href="./03-隐私政策设置.html">隐私政策设置</a>
    <a href="./04-保留用户名设置.html">保留用户名设置</a>
    <a href="./05-注册设置.html">注册设置</a>
    <a href="./06-登录安全设置.html">登录安全设置</a>
    <a href="./07-验证码设置.html">验证码设置</a>
    <a href="./08-二步验证设置.html">二步验证设置</a>
    <a href="./09-IP访问限制.html">IP访问限制</a>
    <a href="./10-后台白名单设置.html">后台白名单设置</a>
  <a href="./11-禁止用户.html">禁止用户</a>
  </nav>

  <section class="signup-card">
    <form class="signup-form">
      <div class="signup-label">
        <strong>新帐号:</strong>
        <span>新会员的帐号</span>
      </div>
      <input type="text">

      <div class="signup-label">
        <strong>Email:</strong>
        <span>新会员的 Email</span>
      </div>
      <input type="email">

      <div class="signup-label">
        <strong>密码:</strong>
        <span>新会员的密码</span>
      </div>
      <input type="password">

      <div class="signup-label">
        <strong>主要会员群组:</strong>
        <span>这个会员将会成为主要会员群组的一员</span>
      </div>
      <select>
        <option selected>没有会员群组</option>
        <option>Regular Members</option>
        <option>Administrator</option>
        <option>Global Moderator</option>
      </select>

      <div class="signup-label">
        <strong>Email 密码给新会员:</strong>
        <span>Email 是必填的，即使没有勾选</span>
      </div>
      <input type="checkbox" checked disabled>

      <div class="signup-label">
        <strong>要求会员启用帐号:</strong>
      </div>
      <input type="checkbox">

      <div class="signup-actions">
        <button type="button">SIGN UP</button>
      </div>
    </form>
  </section>
</body>
</html>
