<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>待处理事项中心</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <script defer src="../assets/theme.js"></script>
  <style>
    .todo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .todo-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: var(--shadow);
    }

    .todo-card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .todo-count {
      font-size: 34px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 8px;
    }

    .todo-link {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .todo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .todo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <p><a href="../index.html">返回目录</a></p>
  <h1>待处理事项中心</h1>
  <p>论坛管理员后台 &gt; 工作台 &gt; 待处理事项中心</p>
  <nav>
  <a href="./01-后台数据总览.html">后台数据总览</a>
  <a href="./02-待处理事项中心.html">待处理事项中心</a>
</nav>
  <section>
  <h2>待处理事项</h2>
  <div class="todo-grid">
    <div class="todo-card">
      <strong>等待审核的主题数</strong>
      <div class="todo-count">2</div>
      <div class="todo-link"><a href="../审核与举报/01-待审核帖子列表.html">进入审核中心</a></div>
    </div>
    <div class="todo-card">
      <strong>等待审核的回复数</strong>
      <div class="todo-count">5</div>
      <div class="todo-link"><a href="../审核与举报/02-待审核主题列表.html">进入审核中心</a></div>
    </div>
    <div class="todo-card">
      <strong>回收站中的主题数</strong>
      <div class="todo-count">3</div>
      <div class="todo-link"><a href="../内容管理/08-回收站管理.html">进入回收站</a></div>
    </div>
    <div class="todo-card">
      <strong>回收站中的帖子数</strong>
      <div class="todo-count">1</div>
      <div class="todo-link"><a href="../内容管理/08-回收站管理.html">进入回收站</a></div>
    </div>
  </div>
</section>
</body>
</html>
